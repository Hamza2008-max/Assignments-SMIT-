<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav-Bar</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Navbar Styling */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: #2c3e50;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}

/* Logo Section */
.logo-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 50px;
    height: 50px;
    object-fit: cover;
}

/* Navigation Menu */
.nav-menu {
    display: flex;
    list-style: none;
    gap: 30px;
    flex: 1;
    justify-content: center;
}

.nav-menu a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.nav-menu a:hover {
    color: #3498db;
}

/* Avatar Section */
.avatar-section {
    display: flex;
    align-items: center;
}

.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #3498db;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.avatar:hover {
    transform: scale(1.1);
}

/* Banner Image Section */
.banner {
    width: 100%;
    height: 400px;
    object-fit: cover;
    display: block;
}

/* Page Heading */
.page-heading {
    padding: 40px 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    text-align: center;
}

.page-heading h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 10px;
}

.page-heading p {
    font-size: 18px;
    opacity: 0.9;
}

/* Main Content */
.content {
    padding: 40px 30px;
    max-width: 1200px;
    margin: 0 auto;
}
    </style>
</head>
<body>
    <!-- Navbar Start -->
    <nav>
        <!-- Logo on Left -->
        <div class="logo-section">
            <img src="https://cdn-icons-png.flaticon.com/512/2331/2331970.png" alt="Website Logo" class="logo">
            <span style="color: white; font-weight: bold; font-size: 20px;">DigiTech</span>
        </div>

        <!-- Navigation Menu in Center -->
        <ul class="nav-menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <!-- Avatar on Right -->
        <div class="avatar-section">
            <img src="https://i.pravatar.cc/50?img=12" alt="User Avatar" class="avatar">
        </div>
    </nav>
    <!-- Navbar End -->

    <!-- Banner Image -->
    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&h=400&fit=crop" alt="Website Banner" class="banner">

    <!-- Page Heading -->
    <section class="page-heading">
        <h1>Welcome to Our Website</h1>
        <p>Creating amazing digital experiences</p>
    </section>

    <!-- Main Content -->
    <section class="content">
        <h2>Our Services</h2>
        <p>Explore our comprehensive range of services designed to help your business grow and succeed in the digital world.</p>
    </section>
</body>
</html>
